<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tom Riddle's Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'IM Fell English',serif;overflow:hidden;position:relative}
.dust{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.dp{position:absolute;border-radius:50%;animation:floatDust linear infinite;opacity:0}
@keyframes floatDust{0%{transform:translateY(100vh);opacity:0}10%{opacity:.6}90%{opacity:.3}100%{transform:translateY(-10vh) translateX(30px);opacity:0}}
.scene{display:none;width:100%;height:100vh;position:relative;z-index:1}
.scene.active{display:flex;align-items:center;justify-content:center}

/* NAME */
#scene-name{flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1a0f00 0%,#0a0500 60%,#000 100%)}
.name-card{display:flex;flex-direction:column;align-items:center;gap:28px;animation:ncFade 1.2s ease forwards;opacity:0}
@keyframes ncFade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.name-eyebrow{font-family:'IM Fell English SC',serif;color:#c8a96e88;font-size:11px;letter-spacing:5px;text-align:center}
.name-heading{font-family:'Cinzel Decorative',cursive;color:#c8a96e;font-size:clamp(16px,3vw,26px);letter-spacing:3px;text-align:center;text-shadow:0 0 40px #c8a96e55;line-height:1.5}
.name-div{width:120px;height:1px;background:linear-gradient(to right,transparent,#c8a96e66,transparent)}
.name-input-wrap{position:relative;width:min(320px,80vw)}
.name-input{width:100%;background:transparent;border:none;border-bottom:1px solid #c8a96e66;padding:10px 4px;color:#f5ead6;font-family:'IM Fell English SC',serif;font-size:18px;letter-spacing:3px;text-align:center;outline:none;transition:border-color .3s;caret-color:#c8a96e}
.name-input::placeholder{color:#c8a96e33;font-size:13px;letter-spacing:4px}
.name-input:focus{border-bottom-color:#c8a96e}
.name-input-wrap::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:1px;background:#c8a96e;transform:translateX(-50%);transition:width .4s;box-shadow:0 0 10px #c8a96e}
.name-input-wrap:focus-within::after{width:100%}
.name-submit{background:transparent;border:1px solid #c8a96e55;color:#c8a96e;font-family:'IM Fell English SC',serif;font-size:13px;letter-spacing:4px;padding:12px 36px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.name-submit::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(to right,transparent,#c8a96e18,transparent);transition:left .4s}
.name-submit:hover{border-color:#c8a96eaa;color:#f5ead6;box-shadow:0 0 20px #c8a96e22}
.name-submit:hover::before{left:100%}
.name-submit:disabled{opacity:.3;cursor:default}
.name-hint{font-family:'IM Fell English',serif;font-style:italic;color:#c8a96e44;font-size:11px;letter-spacing:1px;text-align:center}

/* FLOOR */
#scene-intro{flex-direction:column;background:radial-gradient(ellipse at center,#1a0f00 0%,#0a0500 60%,#000 100%)}
.floor{position:absolute;bottom:0;left:0;right:0;height:35%;background:linear-gradient(to top,#0d0800,#1a1000);border-top:1px solid #2a1800}
.diary-on-floor{position:absolute;bottom:32%;left:50%;transform:translateX(-50%) rotate(-8deg);cursor:pointer;transition:transform .3s,filter .3s;animation:gFloat 3s ease-in-out infinite}
.diary-on-floor:hover{transform:translateX(-50%) rotate(-4deg) scale(1.08);filter:drop-shadow(0 0 20px #c8a96e88)}
@keyframes gFloat{0%,100%{bottom:32%}50%{bottom:33%}}
.diary-svg-floor{width:110px;height:140px}
.prompt-text{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);color:#c8a96e88;font-family:'IM Fell English SC',serif;font-size:13px;letter-spacing:3px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.scene-title{position:absolute;top:12%;left:50%;transform:translateX(-50%);color:#c8a96e;font-family:'Cinzel Decorative',cursive;font-size:clamp(14px,2.5vw,22px);letter-spacing:4px;text-align:center;text-shadow:0 0 30px #c8a96e66;white-space:nowrap}

/* BOOK */
#scene-diary{background:radial-gradient(ellipse at center,#0f0800 0%,#050300 100%);flex-direction:column}
.open-book-container{position:relative;width:min(700px,95vw);animation:bookReveal 1s ease forwards}
@keyframes bookReveal{from{opacity:0;transform:scale(.7) rotateX(20deg)}to{opacity:1;transform:scale(1) rotateX(0deg)}}
.open-book{width:100%;position:relative;display:flex;filter:drop-shadow(0 20px 60px rgba(0,0,0,.9))}
.book-page{flex:1;min-height:400px;background:#f5ead6;position:relative;padding:30px 24px;display:flex;flex-direction:column}
.book-page.left{border-radius:4px 0 0 4px;background:linear-gradient(to right,#e8d9bb,#f5ead6);box-shadow:inset -4px 0 12px rgba(0,0,0,.15)}
.book-page.right{border-radius:0 4px 4px 0;background:linear-gradient(to left,#e8d9bb,#f5ead6);box-shadow:inset 4px 0 12px rgba(0,0,0,.15)}
.book-spine{width:24px;background:linear-gradient(to right,#3d1f00,#6b3800,#3d1f00);box-shadow:inset 0 0 10px rgba(0,0,0,.5);position:relative}
.book-spine::after{content:'T.M.R.';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(90deg);color:#c8a96e88;font-size:9px;letter-spacing:2px;white-space:nowrap}
.page-lines{position:absolute;top:0;left:0;right:0;bottom:0;background-image:repeating-linear-gradient(transparent,transparent 27px,#c8a96e22 27px,#c8a96e22 28px);pointer-events:none;border-radius:4px}
.page-left-content{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center}
.crest-area{text-align:center;opacity:.15}
.page-right-content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column}
.diary-chat{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:8px;scrollbar-width:none}
.diary-chat::-webkit-scrollbar{display:none}
.msg{max-width:85%;padding:8px 12px;font-size:12px;line-height:1.6;border-radius:2px;animation:inkAppear .6s ease forwards;opacity:0}
@keyframes inkAppear{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.riddle{align-self:flex-start;color:#1a0a00;font-style:italic;font-family:'IM Fell English',serif;border-left:2px solid #6b380066;padding-left:10px}
.msg.player{align-self:flex-end;color:#2d1a00;font-family:'IM Fell English SC',serif;font-size:11px;text-align:right;border-right:2px solid #3d1f0066;padding-right:10px}
.typing{align-self:flex-start;display:flex;gap:4px;padding:10px 0}
.typing span{width:5px;height:5px;background:#6b3800;border-radius:50%;animation:typingDot 1s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
.choices{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.choice-btn{background:transparent;border:1px solid #6b380055;color:#3d1f00;padding:7px 12px;font-family:'IM Fell English SC',serif;font-size:11px;cursor:pointer;text-align:left;border-radius:2px;transition:all .2s;letter-spacing:.5px}
.choice-btn:hover{background:#6b380015;border-color:#6b3800aa;color:#1a0900;transform:translateX(3px)}
.ink-drip{position:absolute;width:3px;background:linear-gradient(to bottom,#1a0a00,transparent);animation:drip linear forwards;border-radius:0 0 50% 50%}
@keyframes drip{from{height:0;opacity:1}to{height:40px;opacity:0}}

/* MEMORY */
#scene-memory{background:#000;overflow:hidden}
#memoryCanvas{position:absolute;top:0;left:0;width:100%;height:100%}
.mem-label{position:absolute;font-family:'Cinzel Decorative',cursive;color:#c8a96ecc;letter-spacing:5px;font-size:clamp(10px,1.6vw,15px);text-align:center;text-shadow:0 0 20px #c8a96e;opacity:0;transition:opacity 1.2s ease;pointer-events:none;z-index:10;width:100%;left:0}
#memTop{top:8%}
#memBot{bottom:8%}

/* LOVE */
#scene-love{background:radial-gradient(ellipse at center,#0d0006 0%,#000 100%);flex-direction:column;align-items:center;justify-content:center}
.love-text{font-family:'Cinzel Decorative',cursive;color:#fff;font-size:clamp(28px,7vw,72px);text-align:center;letter-spacing:8px;text-shadow:0 0 60px #ff3366,0 0 120px #ff336644;opacity:0;animation:loveReveal 2s ease .5s forwards}
@keyframes loveReveal{0%{opacity:0;transform:scale(.5);filter:blur(20px)}60%{filter:blur(0)}100%{opacity:1;transform:scale(1)}}
.love-sub{color:#ff336688;font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(12px,2vw,18px);letter-spacing:6px;margin-top:16px;opacity:0;animation:loveReveal 2s ease 1.5s forwards;text-align:center}
.heart{position:fixed;animation:heartFloat linear forwards;pointer-events:none;z-index:10;opacity:0}
@keyframes heartFloat{0%{transform:translateY(0) scale(0);opacity:0}10%{opacity:1;transform:scale(1)}100%{transform:translateY(-80vh) scale(.5) rotate(20deg);opacity:0}}
.flash-white{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:999;pointer-events:none;animation:flashAnim 2s ease forwards}
@keyframes flashAnim{0%{opacity:0}30%{opacity:1}65%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>

<div class="dust" id="dust"></div>

<!-- NAME -->
<div id="scene-name" class="scene active">
  <div class="name-card">
    <div class="name-eyebrow">Chamber of Secrets</div>
    <div class="name-heading">Who dares open<br>the diary?</div>
    <div class="name-div"></div>
    <div class="name-input-wrap">
      <input class="name-input" id="nameInput" type="text" placeholder="Enter your name…" maxlength="24" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')submitName()"/>
    </div>
    <button class="name-submit" id="nameSubmitBtn" onclick="submitName()" disabled>Open the Diary</button>
    <div class="name-hint">Press Enter or click to continue</div>
  </div>
  <svg style="position:absolute;bottom:10%;left:8%;width:28px;height:55px;pointer-events:none;opacity:.35" viewBox="0 0 30 60"><rect x="11" y="25" width="8" height="35" rx="1" fill="#d4a050"/><ellipse cx="15" cy="22" rx="5" ry="8" fill="#ffcc44" opacity=".8"><animate attributeName="ry" values="8;10;7;9;8" dur="1.5s" repeatCount="indefinite"/></ellipse></svg>
  <svg style="position:absolute;bottom:10%;right:9%;width:28px;height:55px;pointer-events:none;opacity:.3" viewBox="0 0 30 60"><rect x="11" y="25" width="8" height="35" rx="1" fill="#d4a050"/><ellipse cx="15" cy="22" rx="5" ry="8" fill="#ffcc44" opacity=".8"><animate attributeName="ry" values="7;9;8;10;7" dur="1.8s" repeatCount="indefinite"/></ellipse></svg>
</div>

<!-- FLOOR -->
<div id="scene-intro" class="scene">
  <div class="scene-title">Chamber of Secrets</div>
  <div class="floor"></div>
  <svg style="position:absolute;bottom:30%;left:0;width:100%;height:120px;pointer-events:none" viewBox="0 0 800 120" preserveAspectRatio="none"><defs><radialGradient id="fogG" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#c8a96e" stop-opacity=".06"/><stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/></radialGradient></defs><ellipse cx="400" cy="60" rx="400" ry="60" fill="url(#fogG)"/></svg>
  <div class="diary-on-floor" onclick="openDiary()">
    <svg class="diary-svg-floor" viewBox="0 0 110 140" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4a2800"/><stop offset="50%" stop-color="#6b3800"/><stop offset="100%" stop-color="#3d1f00"/></linearGradient></defs>
      <ellipse cx="55" cy="138" rx="40" ry="5" fill="#00000088"/>
      <rect x="8" y="6" width="94" height="126" rx="4" fill="url(#cg)" stroke="#1a0900" stroke-width="1"/>
      <rect x="8" y="6" width="10" height="126" rx="2" fill="#2a1000"/>
      <line x1="22" y1="20" x2="96" y2="20" stroke="#c8a96e22" stroke-width=".5"/>
      <line x1="22" y1="120" x2="96" y2="120" stroke="#c8a96e22" stroke-width=".5"/>
      <rect x="22" y="40" width="72" height="60" rx="2" fill="none" stroke="#c8a96e44" stroke-width=".5"/>
      <text x="58" y="68" text-anchor="middle" font-family="serif" font-size="8" fill="#c8a96e88" letter-spacing="3">T.M.R.</text>
      <text x="58" y="82" text-anchor="middle" font-family="serif" font-size="6" fill="#c8a96e55">❧</text>
    </svg>
    <div class="prompt-text">Click to pick up</div>
  </div>
  <svg style="position:absolute;bottom:34%;left:10%;width:30px;height:60px;pointer-events:none;opacity:.4" viewBox="0 0 30 60"><rect x="11" y="25" width="8" height="35" rx="1" fill="#d4a050"/><ellipse cx="15" cy="22" rx="5" ry="8" fill="#ffcc44" opacity=".8"><animate attributeName="ry" values="8;10;7;9;8" dur="1.5s" repeatCount="indefinite"/></ellipse></svg>
  <svg style="position:absolute;bottom:34%;right:12%;width:30px;height:50px;pointer-events:none;opacity:.3" viewBox="0 0 30 60"><rect x="11" y="25" width="8" height="35" rx="1" fill="#d4a050"/><ellipse cx="15" cy="22" rx="5" ry="8" fill="#ffcc44" opacity=".8"><animate attributeName="ry" values="7;9;8;10;7" dur="1.8s" repeatCount="indefinite"/></ellipse></svg>
</div>

<!-- BOOK -->
<div id="scene-diary" class="scene">
  <div class="open-book-container">
    <div class="open-book">
      <div class="book-page left">
        <div class="page-lines"></div>
        <div class="page-left-content">
          <div class="crest-area">
            <svg viewBox="0 0 120 120" width="120" height="120">
              <polygon points="60,10 110,40 110,80 60,110 10,80 10,40" fill="none" stroke="#3d1f00" stroke-width="1.5"/>
              <polygon points="60,20 100,45 100,75 60,100 20,75 20,45" fill="none" stroke="#3d1f0055" stroke-width=".5"/>
              <text x="60" y="58" text-anchor="middle" font-family="serif" font-size="14" fill="#3d1f00">T</text>
              <text x="60" y="72" text-anchor="middle" font-family="serif" font-size="8" fill="#3d1f0088" letter-spacing="1">MARVOLO RIDDLE</text>
            </svg>
            <div style="font-family:'IM Fell English SC',serif;font-size:9px;color:#3d1f0066;letter-spacing:2px;margin-top:8px">Property of T.M. Riddle</div>
          </div>
        </div>
      </div>
      <div class="book-spine"></div>
      <div class="book-page right">
        <div class="page-lines"></div>
        <div class="page-right-content">
          <div class="diary-chat" id="chat-messages"></div>
          <div class="choices" id="choices-area"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MEMORY -->
<div id="scene-memory" class="scene">
  <canvas id="memoryCanvas"></canvas>
  <div class="mem-label" id="memTop">— A Memory —</div>
  <div class="mem-label" id="memBot"></div>
</div>

<!-- LOVE -->
<div id="scene-love" class="scene">
  <div class="love-text">I Love You</div>
  <div class="love-sub" id="loveSub">— from the diary —</div>
</div>

<script>
// ── DUST ──
(function(){
  const el=document.getElementById('dust');
  for(let i=0;i<35;i++){
    const p=document.createElement('div');p.className='dp';
    const s=1+Math.random()*2;
    p.style.cssText=`left:${Math.random()*100}%;width:${s}px;height:${s}px;background:radial-gradient(circle,#c8a96e,transparent);animation-duration:${8+Math.random()*15}s;animation-delay:${-Math.random()*20}s`;
    el.appendChild(p);
  }
})();

// ── NAME ──
let playerName='Stranger';
const nameInput=document.getElementById('nameInput');
const nameBtn=document.getElementById('nameSubmitBtn');
nameInput.addEventListener('input',()=>{ nameBtn.disabled=!nameInput.value.trim(); });
function submitName(){
  const v=nameInput.value.trim(); if(!v)return;
  playerName=v[0].toUpperCase()+v.slice(1);
  const s=document.getElementById('scene-name');
  s.style.transition='opacity .7s'; s.style.opacity='0';
  setTimeout(()=>show('scene-intro'),700);
}

// ── SCENES ──
function show(id){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── OPEN DIARY ──
function openDiary(){
  const d=document.querySelector('.diary-on-floor');
  d.style.transition='all .8s cubic-bezier(.25,.46,.45,.94)';
  d.style.transform='translateX(-50%) scale(1.4) rotate(0) translateY(-60px)';
  d.style.filter='drop-shadow(0 0 40px #c8a96e)';
  setTimeout(()=>{ show('scene-diary'); startDiary(); },900);
}

// ── DIARY CHAT ──
const chatEl=document.getElementById('chat-messages');
const choicesEl=document.getElementById('choices-area');

function addMsg(text,who,delay=0){
  return new Promise(res=>{
    let typing=null;
    if(who==='riddle'&&delay>300){
      typing=document.createElement('div'); typing.className='typing';
      typing.innerHTML='<span></span><span></span><span></span>';
      chatEl.appendChild(typing); chatEl.scrollTop=chatEl.scrollHeight;
    }
    setTimeout(()=>{
      if(typing)typing.remove();
      const m=document.createElement('div'); m.className=`msg ${who}`; m.textContent=text;
      chatEl.appendChild(m); chatEl.scrollTop=chatEl.scrollHeight; res();
    },delay);
  });
}
function setChoices(opts){
  choicesEl.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button'); b.className='choice-btn'; b.textContent=o.text;
    b.onclick=()=>o.fn(); choicesEl.appendChild(b);
  });
}
function clearChoices(){ choicesEl.innerHTML=''; }

async function startDiary(){
  await sleep(600);
  await addMsg('My name is Tom Riddle.','riddle',400);
  await sleep(500);
  await addMsg(`Hey there, ${playerName}! How can I help you?`,'riddle',1000);
  await sleep(400);
  setChoices([
    {text:'Who are you really?',fn:async()=>{
      clearChoices();
      await addMsg('Who are you really?','player',0);
      await addMsg(`I am many things, ${playerName}. A memory… preserved in ink and dark magic.`,'riddle',1200);
      await sleep(500); showInitialChoices();
    }},
    {text:'Can you show me things?',fn:async()=>{
      clearChoices();
      await addMsg('Can you show me things?','player',0);
      await addMsg('I can show you things no one else can. Secrets buried deep in time.','riddle',1200);
      await sleep(500); showInitialChoices();
    }},
    {text:'Tell me about the Chamber of Secrets.',fn:()=>goToSecret()}
  ]);
}
function showInitialChoices(){
  setChoices([
    {text:'Yes — show me everything!',fn:()=>goToSecret()},
    {text:'What happened inside the Chamber?',fn:()=>goToSecret()}
  ]);
}
async function goToSecret(){
  clearChoices();
  await addMsg('Yes, tell me! Show me!','player',0);
  await sleep(400);
  await addMsg('I cannot tell you…','riddle',1200);
  await sleep(600);
  await addMsg('But I can show you.','riddle',800);
  await sleep(400);
  // ink drips
  const pg=document.querySelector('.book-page.right');
  for(let i=0;i<5;i++) setTimeout(()=>{
    const d=document.createElement('div'); d.className='ink-drip';
    d.style.cssText=`left:${20+Math.random()*70}%;top:${10+Math.random()*60}%;height:0;animation:drip ${.8+Math.random()*.5}s linear forwards`;
    pg.appendChild(d); setTimeout(()=>d.remove(),1500);
  },i*180);
  await sleep(1800);
  // flash then memory
  const fl=document.createElement('div'); fl.className='flash-white'; document.body.appendChild(fl);
  setTimeout(()=>{ fl.remove(); show('scene-memory'); runMemory(); },2000);
}

// ═══════════════════════════════════════════════════
//   CANVAS MEMORY SEQUENCE
// ═══════════════════════════════════════════════════
let memRaf=null;

function runMemory(){
  const canvas=document.getElementById('memoryCanvas');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const W=canvas.width, H=canvas.height;
  const ctx=canvas.getContext('2d');

  const topLbl=document.getElementById('memTop');
  const botLbl=document.getElementById('memBot');
  botLbl.textContent=`${playerName}'s fate revealed…`;
  setTimeout(()=>topLbl.style.opacity='1',500);
  setTimeout(()=>botLbl.style.opacity='1',1400);

  // ─── particle pools ───
  const inkParts=[], lightParts=[], spiralParts=[], shardParts=[], soulParts=[];
  const stars=Array.from({length:220},()=>({
    x:Math.random()*W, y:Math.random()*H*.65,
    r:.5+Math.random()*1.2, b:Math.random()
  }));

  for(let i=0;i<90;i++) inkParts.push({
    x:Math.random()*W, y:-Math.random()*H*.6,
    vx:(Math.random()-.5)*2.5, vy:1.5+Math.random()*5,
    r:3+Math.random()*14, a:0, delay:Math.floor(Math.random()*80)
  });

  // ─── phases ───
  const phases=[
    {frames:200, name:'— A Memory —',         draw:phaseInkFlood},
    {frames:240, name:'Hogwarts, 50 years ago…',draw:phaseHogwarts},
    {frames:180, name:'The storm gathers…',     draw:phaseLightning},
    {frames:220, name:'Dark magic awakens…',    draw:phaseSpiral},
    {frames:200, name:'The diary… destroyed.',  draw:phaseDiary},
    {frames:150, name:'A soul — torn apart.',   draw:phaseSoul},
  ];
  let phase=0, ft=0, frame=0, loveTriggered=false;

  // ─── PHASE 0: ink floods parchment ───
  function phaseInkFlood(t,p){
    // parchment fading to black
    ctx.fillStyle=`rgba(245,234,214,${Math.max(0,.95-p*1.8)})`;
    ctx.fillRect(0,0,W,H);

    // dark void rising
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,`rgba(4,0,12,${Math.min(1,p*1.4)})`);
    g.addColorStop(1,`rgba(12,5,0,${Math.min(1,p*1.4)})`);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // ink tide from bottom
    const iy=H*(1-p*1.05);
    const ig=ctx.createLinearGradient(0,iy,0,H);
    ig.addColorStop(0,'rgba(8,0,20,0)');
    ig.addColorStop(.25,'rgba(8,0,20,.6)');
    ig.addColorStop(1,'rgba(4,0,10,1)');
    ctx.fillStyle=ig; ctx.fillRect(0,iy,W,H);

    // ink drops falling
    inkParts.forEach(d=>{
      if(d.delay>0){d.delay--;return;}
      d.y+=d.vy; d.x+=d.vx; d.a=Math.min(.85,d.a+.05);
      ctx.save(); ctx.globalAlpha=d.a;
      ctx.fillStyle='#060015';
      ctx.beginPath(); ctx.ellipse(d.x,d.y,d.r*.55,d.r,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
      if(d.y>H+20){d.y=-20;d.x=Math.random()*W;d.a=0;}
    });

    // floating rune letters
    const runes='TMRIDDLE MEMORY INK MARVOLO GINNY'.split('');
    ctx.save();
    runes.forEach((ch,i)=>{
      if(ch===' ')return;
      const rx=W*.08+i*(W*.84/runes.length);
      const ry=H*.65-p*H*.5+Math.sin(t*.05+i*.8)*18;
      ctx.globalAlpha=Math.max(0,p-.15)*Math.abs(Math.sin(i*.4+t*.025))*.55;
      ctx.fillStyle='#c8a96e';
      ctx.font=`${13+Math.sin(i+t*.03)*3}px 'IM Fell English SC',serif`;
      ctx.textAlign='center'; ctx.fillText(ch,rx,ry);
    });
    ctx.restore();
  }

  // ─── PHASE 1: Hogwarts rises from mist ───
  function phaseHogwarts(t,p){
    // sky
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#020008'); sky.addColorStop(.5,'#060016'); sky.addColorStop(1,'#0a0500');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // stars
    stars.forEach(s=>{
      const twinkle=.5+.5*Math.sin(t*.04+s.x*.01);
      ctx.save(); ctx.globalAlpha=(.3+s.b*.6)*Math.min(1,p*4)*twinkle;
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });

    // moon with halo
    const mx=W*.76,my=H*.15,mr=36;
    ctx.save(); ctx.globalAlpha=Math.min(1,p*2.5);
    const mh=ctx.createRadialGradient(mx,my,0,mx,my,mr*3);
    mh.addColorStop(0,'rgba(255,245,210,.95)');
    mh.addColorStop(.35,'rgba(240,220,160,.6)');
    mh.addColorStop(1,'rgba(200,170,100,0)');
    ctx.fillStyle=mh; ctx.beginPath(); ctx.arc(mx,my,mr*3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f8edc8'; ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Castle silhouette rising dramatically
    const rise=Math.min(1,p*1.6);
    const castleTopY=H*.52-rise*H*.32;
    ctx.save(); ctx.globalAlpha=Math.min(1,p*2.5);
    drawCastle(W*.5,castleTopY,W*.6,H*.38*rise);
    ctx.restore();

    // Reflected castle in lake (inverted, semi-transparent)
    ctx.save(); ctx.globalAlpha=.12*Math.min(1,p*2);
    ctx.transform(1,0,0,-.25,0,H*.88);
    drawCastle(W*.5,castleTopY,W*.6,H*.38*rise);
    ctx.restore();

    // mist layers over lake
    for(let i=0;i<5;i++){
      const wx=W*(i*.2+.05);
      const wg=ctx.createRadialGradient(wx,H*.73,0,wx,H*.73,W*.15);
      wg.addColorStop(0,`rgba(160,140,100,${.07*Math.sin(t*.018+i)*Math.min(1,p*4)})`);
      wg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=wg; ctx.fillRect(0,0,W,H);
    }

    // ground dark
    const gnd=ctx.createLinearGradient(0,H*.6,0,H);
    gnd.addColorStop(0,'rgba(8,5,0,0)'); gnd.addColorStop(.4,'rgba(5,3,0,.8)'); gnd.addColorStop(1,'rgba(2,1,0,1)');
    ctx.fillStyle=gnd; ctx.fillRect(0,H*.6,W,H);

    // "50 years ago" floating text
    ctx.save(); ctx.globalAlpha=Math.max(0,p-.4)*1.6;
    ctx.font=`italic ${fsize(15)}px 'IM Fell English',serif`;
    ctx.fillStyle='#c8b070'; ctx.textAlign='center';
    ctx.fillText('Hogwarts, 50 years ago…',W*.5,H*.07+Math.sin(t*.04)*3);
    ctx.restore();
  }

  // ─── PHASE 2: lightning storm ───
  function phaseLightning(t,p){
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#010006'); sky.addColorStop(.7,'#040012'); sky.addColorStop(1,'#030008');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // boiling storm clouds
    for(let i=0;i<6;i++){
      const cx2=W*(.1+i*.16), cy2=H*(.08+i*.025);
      const cr=W*.2+Math.sin(t*.012+i)*W*.04;
      const cg=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,cr);
      const cd=.12+p*.18+.06*Math.sin(t*.018+i);
      cg.addColorStop(0,`rgba(18,8,38,${cd})`); cg.addColorStop(1,'rgba(3,0,10,0)');
      ctx.fillStyle=cg; ctx.fillRect(0,0,W,H);
    }

    // Castle dark beneath storm
    ctx.save(); ctx.globalAlpha=.92;
    drawCastle(W*.5,H*.52,W*.6,H*.38);
    ctx.restore();

    // Lightning
    if(frame%14<2){
      lightParts.push({life:10,x:W*.15+Math.random()*W*.7,bright:1});
    }
    lightParts.forEach((lb,idx)=>{
      lb.life--;
      if(lb.life<=0){lightParts.splice(idx,1);return;}
      const al=lb.life/10;
      ctx.save(); ctx.globalAlpha=al*.85;
      ctx.strokeStyle=`rgba(140,160,255,${al})`;
      ctx.lineWidth=1.5+al*3; ctx.shadowColor='#7080ff'; ctx.shadowBlur=25;
      ctx.beginPath(); ctx.moveTo(lb.x,0);
      let lx=lb.x,ly=0;
      while(ly<H*.65){
        lx+=(Math.random()-.5)*55; ly+=15+Math.random()*35;
        ctx.lineTo(lx,ly);
        if(Math.random()<.35){
          ctx.moveTo(lx,ly);
          ctx.lineTo(lx+(Math.random()-.5)*70,ly+Math.random()*55);
          ctx.moveTo(lx,ly);
        }
      }
      ctx.stroke();
      // sky flash
      ctx.globalAlpha=al*.2;
      ctx.fillStyle='rgba(160,180,255,.08)'; ctx.fillRect(0,0,W,H);
      ctx.restore();
    });

    // rain streaks
    ctx.save(); ctx.strokeStyle='rgba(80,80,160,.12)'; ctx.lineWidth=.5;
    for(let i=0;i<150;i++){
      const rx=(t*4+i*107)%W, ry=(t*9+i*67)%H;
      ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx-5,ry+14); ctx.stroke();
    }
    ctx.restore();

    ctx.save(); ctx.globalAlpha=Math.min(1,(p-.2)*2);
    ctx.font=`italic ${fsize(15)}px 'IM Fell English',serif`;
    ctx.fillStyle='#6030a0'; ctx.textAlign='center';
    ctx.fillText('The Dark Lord rises…',W*.5,H*.07);
    ctx.restore();
  }

  // ─── PHASE 3: Parseltongue / dark magic spirals ───
  function phaseSpiral(t,p){
    ctx.fillStyle='#010008'; ctx.fillRect(0,0,W,H);

    // rune wheel rotating
    ctx.save(); ctx.translate(W*.5,H*.5); ctx.rotate(t*.002);
    ctx.globalAlpha=.05+.02*Math.sin(t*.03);
    ctx.strokeStyle='#6020a0'; ctx.lineWidth=.8;
    for(let i=0;i<12;i++){
      const a=i/12*Math.PI*2, r=Math.min(W,H)*.4;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r); ctx.stroke();
    }
    // outer hexagon
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=i/6*Math.PI*2, r=Math.min(W,H)*.38;
      i?ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r):ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath(); ctx.stroke();
    ctx.restore();

    // fill spiral pool
    while(spiralParts.length<350) spiralParts.push({
      angle:Math.random()*Math.PI*2,
      radius:20+Math.random()*Math.min(W,H)*.44,
      speed:(.002+Math.random()*.007)*(Math.random()<.5?1:-1),
      r:1+Math.random()*3.5,
      hue:Math.random()<.65?275:48,
      a:0
    });
    spiralParts.forEach((sp,i)=>{
      sp.angle+=sp.speed*(1+p*.5);
      sp.a=Math.min(.85,sp.a+.025);
      const sx=W*.5+Math.cos(sp.angle)*sp.radius;
      const sy=H*.5+Math.sin(sp.angle)*sp.radius;
      ctx.save(); ctx.globalAlpha=sp.a*.65;
      const lum=45+20*Math.sin(t*.05+i*.07);
      ctx.fillStyle=`hsl(${sp.hue},85%,${lum}%)`;
      ctx.shadowColor=`hsl(${sp.hue},100%,65%)`; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(sx,sy,sp.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });

    // Parseltongue serpent path
    ctx.save();
    ctx.strokeStyle=`rgba(30,180,50,${.18+.08*Math.sin(t*.06)})`;
    ctx.lineWidth=2.5; ctx.shadowColor='#18b030'; ctx.shadowBlur=18;
    ctx.beginPath();
    for(let i=0;i<=240;i++){
      const a=i*.14+t*.018;
      const r=40+i*.82+22*Math.sin(i*.28+t*.05);
      const sx=W*.5+Math.cos(a)*r, sy=H*.5+Math.sin(a)*r*.58;
      i?ctx.lineTo(sx,sy):ctx.moveTo(sx,sy);
    }
    ctx.stroke(); ctx.restore();

    // Ghost face radial glow
    ctx.save(); ctx.globalAlpha=(.18+.08*Math.sin(t*.03))*Math.min(1,p*2);
    const fg=ctx.createRadialGradient(W*.5,H*.47,0,W*.5,H*.47,Math.min(W,H)*.22);
    fg.addColorStop(0,'rgba(170,130,90,.4)');
    fg.addColorStop(.5,'rgba(90,50,30,.12)');
    fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg; ctx.fillRect(0,0,W,H); ctx.restore();

    ctx.save(); ctx.globalAlpha=Math.min(1,p*2.5);
    ctx.font=`italic ${fsize(14)}px 'IM Fell English',serif`;
    ctx.fillStyle='#8040c0'; ctx.textAlign='center';
    ctx.fillText('"I fashioned myself a new name… Lord Voldemort."',W*.5,H*.07);
    ctx.restore();
  }

  // ─── PHASE 4: basilisk fang destroys diary ───
  function phaseDiary(t,p){
    ctx.fillStyle='#020010'; ctx.fillRect(0,0,W,H);

    // fading spiral residue
    ctx.save(); ctx.globalAlpha=(1-p)*.3;
    spiralParts.slice(0,80).forEach(sp=>{
      sp.angle+=sp.speed*.3;
      const sx=W*.5+Math.cos(sp.angle)*sp.radius;
      const sy=H*.5+Math.sin(sp.angle)*sp.radius;
      ctx.fillStyle=`hsl(${sp.hue},60%,35%)`;
      ctx.beginPath(); ctx.arc(sx,sy,sp.r*.4,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();

    // Diary book
    const bx=W*.5, by=H*.48;
    const bw=Math.min(110,W*.14), bh=bw*1.35;
    const shake=(p>.5)?(Math.random()-.5)*6:0;
    ctx.save(); ctx.translate(bx+shake,by+shake);
    ctx.rotate(Math.sin(t*.1)*.035*(1-p));
    ctx.fillStyle='#3d1f00'; ctx.fillRect(-bw/2,-bh/2,bw,bh);
    ctx.fillStyle='#5a2e00'; ctx.fillRect(-bw/2+3,-bh/2+3,bw-6,bh-6);
    ctx.fillStyle='#1e0f00'; ctx.fillRect(-bw/2,-bh/2,7,bh);
    // cover lines
    ctx.strokeStyle='#c8a96e22'; ctx.lineWidth=.5;
    ctx.strokeRect(-bw/2+10,-bh/2+8,bw-15,bh-16);
    ctx.fillStyle='#c8a96e55'; ctx.font='bold 8px serif'; ctx.textAlign='center';
    ctx.fillText('T.M.R.',0,3);
    ctx.restore();

    // Fang plunging
    const fp=Math.min(1,p*2.2);
    const fangTip={x:bx,y:by-bh*.25};
    const fangStart={x:bx+5,y:by-bh*.25-H*.38*(1-fp)};
    ctx.save(); ctx.globalAlpha=Math.min(1,fp*2);
    // fang body
    ctx.fillStyle='#d0d0b0';
    ctx.beginPath();
    ctx.moveTo(fangStart.x-5,fangStart.y-30);
    ctx.lineTo(fangStart.x+5,fangStart.y-30);
    ctx.lineTo(fangStart.x+2,fangTip.y);
    ctx.lineTo(fangTip.x,fangTip.y+12);
    ctx.lineTo(fangTip.x-2,fangTip.y);
    ctx.closePath(); ctx.fill();
    // venom
    if(fp>.6){
      ctx.fillStyle='#20d040';
      ctx.shadowColor='#40ff60'; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.arc(fangTip.x,fangTip.y+10,5,0,Math.PI*2); ctx.fill();
      // venom drip trail
      ctx.strokeStyle='rgba(30,200,50,.4)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(fangTip.x,fangTip.y+12);
      ctx.lineTo(fangTip.x+2,fangTip.y+30); ctx.stroke();
    }
    ctx.restore();

    // Impact ink burst
    if(p>.48){
      const ip=(p-.48)*1.9;
      for(let i=0;i<24;i++){
        const a=i/24*Math.PI*2;
        const ir=ip*Math.min(W,H)*.38*(.4+.6*(i%3)/3);
        ctx.save(); ctx.globalAlpha=Math.max(0,(1-ip*.8)*.75);
        ctx.fillStyle=`rgba(${i*4},0,${20+i*5},.85)`;
        ctx.beginPath(); ctx.arc(bx+Math.cos(a)*ir,by+Math.sin(a)*ir*1.1,3+Math.random()*9,0,Math.PI*2);
        ctx.fill(); ctx.restore();
      }
    }

    // Shards spawning
    if(p>.6&&shardParts.length===0){
      for(let i=0;i<50;i++) shardParts.push({
        x:bx+(Math.random()-.5)*bw,y:by+(Math.random()-.5)*bh,
        vx:(Math.random()-.5)*9, vy:(Math.random()-.5)*9-4,
        rot:Math.random()*Math.PI*2, vrot:(Math.random()-.5)*.35,
        sz:4+Math.random()*13, a:1,
        col:Math.random()<.5?'#4a2800':'#c8a96e'
      });
    }
    shardParts.forEach(s=>{
      s.x+=s.vx; s.y+=s.vy; s.vy+=.2; s.rot+=s.vrot; s.a=Math.max(0,s.a-.012);
      ctx.save(); ctx.globalAlpha=s.a; ctx.translate(s.x,s.y); ctx.rotate(s.rot);
      ctx.fillStyle=s.col; ctx.fillRect(-s.sz/2,-s.sz/3,s.sz,s.sz/2);
      ctx.restore();
    });

    ctx.save(); ctx.globalAlpha=Math.min(1,(p-.25)*2);
    ctx.font=`italic ${fsize(14)}px 'IM Fell English',serif`;
    ctx.fillStyle='#c04018'; ctx.textAlign='center';
    ctx.fillText('"The diary… destroyed."',W*.5,H*.08);
    ctx.restore();
  }

  // ─── PHASE 5: Horcrux soul shatters / screams ───
  function phaseSoul(t,p){
    ctx.fillStyle=`rgba(1,0,6,${.88+p*.1})`; ctx.fillRect(0,0,W,H);

    // shockwave rings emanating from center
    for(let w=0;w<5;w++){
      const wt=((t*.035+w*.3)%1);
      const wr=wt*Math.min(W,H)*.75;
      ctx.save(); ctx.globalAlpha=(1-wt)*.35;
      ctx.strokeStyle=`hsl(${260+w*18},100%,${55+w*5}%)`;
      ctx.lineWidth=1.5*(1-wt)+.5;
      ctx.shadowColor=`hsl(${260+w*18},100%,65%)`; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.arc(W*.5,H*.5,wr,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // soul particles flying out
    if(frame%2===0&&soulParts.length<300) for(let i=0;i<6;i++) soulParts.push({
      angle:Math.random()*Math.PI*2,
      speed:.8+Math.random()*5,
      x:W*.5,y:H*.5,
      r:.8+Math.random()*3.5,
      hue:230+Math.random()*100,
      a:1, life:50+Math.random()*70
    });
    soulParts.forEach((sp,i)=>{
      sp.x+=Math.cos(sp.angle)*sp.speed;
      sp.y+=Math.sin(sp.angle)*sp.speed;
      sp.speed*=.98;
      sp.life--; sp.a=sp.life/120;
      ctx.save(); ctx.globalAlpha=sp.a*.85;
      ctx.fillStyle=`hsl(${sp.hue},100%,72%)`;
      ctx.shadowColor=`hsl(${sp.hue},100%,72%)`; ctx.shadowBlur=14;
      ctx.beginPath(); ctx.arc(sp.x,sp.y,sp.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
      if(sp.life<=0) soulParts.splice(i,1);
    });

    // Central glow — soul fragment scream
    const si=.25+.18*Math.sin(t*.18);
    const sg=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,Math.min(W,H)*.35);
    sg.addColorStop(0,`rgba(210,190,255,${si})`);
    sg.addColorStop(.4,`rgba(110,50,200,${si*.38})`);
    sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

    // Screaming face outline
    const fa=(.28+.18*Math.sin(t*.22))*Math.min(1,p*4);
    const fx=W*.5, fy=H*.5, fs=Math.min(W,H)*.13;
    ctx.save(); ctx.globalAlpha=fa;
    ctx.strokeStyle='rgba(215,200,255,.65)'; ctx.lineWidth=1.8;
    ctx.shadowColor='rgba(180,160,255,.8)'; ctx.shadowBlur=20;
    // face oval
    ctx.beginPath(); ctx.ellipse(fx,fy,fs*.72,fs*1.05,0,0,Math.PI*2); ctx.stroke();
    // hollow eyes
    ctx.beginPath(); ctx.ellipse(fx-fs*.26,fy-fs*.18,fs*.13,fs*.19,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(fx+fs*.26,fy-fs*.18,fs*.13,fs*.19,0,0,Math.PI*2); ctx.stroke();
    // screaming mouth (wide oval)
    ctx.beginPath(); ctx.ellipse(fx,fy+fs*.32,fs*.28,fs*.38,0,0,Math.PI*2); ctx.stroke();
    // nose slits (Voldemort-like)
    ctx.beginPath(); ctx.ellipse(fx-fs*.07,fy,fs*.04,fs*.08,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(fx+fs*.07,fy,fs*.04,fs*.08,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();

    // Final quote
    ctx.save(); ctx.globalAlpha=Math.min(1,(p-.35)*2.2);
    ctx.font=`italic ${fsize(13)}px 'IM Fell English',serif`;
    ctx.fillStyle='rgba(175,155,255,.95)'; ctx.textAlign='center';
    ctx.fillText('"…a piece of his soul, torn away forever."',W*.5,H*.08);
    ctx.restore();

    // Transition when done
    if(p>.96&&!loveTriggered){
      loveTriggered=true;
      setTimeout(()=>{
        cancelAnimationFrame(memRaf);
        topLbl.style.opacity='0'; botLbl.style.opacity='0';
        showLoveScene();
      },500);
    }
  }

  // ─── Castle helper ───
  function drawCastle(cx,cy,cw,ch){
    ctx.fillStyle='#040010';
    ctx.fillRect(cx-cw*.26,cy,cw*.52,ch*.72);
    const tows=[-0.46,-0.29,0.29,0.46];
    tows.forEach((ox,i)=>{
      const tw=cw*(i%2===0?.085:.06);
      const th=ch*(i%2===0?.82:.72);
      ctx.fillRect(cx+ox*cw-tw/2,cy,tw,th);
      for(let b=0;b<4;b++) ctx.fillRect(cx+ox*cw-tw/2+b*(tw/4),cy-7,tw/5,9);
      ctx.beginPath();
      ctx.moveTo(cx+ox*cw-tw/2,cy);
      ctx.lineTo(cx+ox*cw,cy-ch*(i%2===0?.16:.1));
      ctx.lineTo(cx+ox*cw+tw/2,cy); ctx.closePath(); ctx.fill();
    });
    // lit windows
    ctx.fillStyle='rgba(255,190,60,.12)';
    for(let i=0;i<10;i++){
      const wx=cx-cw*.22+i*(cw*.44/10)+cw*.02;
      ctx.fillRect(wx,cy+ch*.2,cw*.022,ch*.07);
    }
    // Great Hall arch
    ctx.fillStyle='rgba(255,200,80,.06)';
    ctx.beginPath();
    ctx.moveTo(cx-cw*.07,cy+ch*.72);
    ctx.quadraticCurveTo(cx,cy+ch*.35,cx+cw*.07,cy+ch*.72);
    ctx.fill();
  }

  function fsize(base){ return Math.max(base,Math.min(base*1.4,window.innerWidth*base/900)); }

  // ─── LOOP ───
  let loveTriggered2=false; // alias
  function loop(){
    memRaf=requestAnimationFrame(loop);
    frame++;

    const ph=phases[phase];
    const progress=Math.min(1,ft/ph.frames);

    // slight motion blur trail
    ctx.fillStyle='rgba(0,0,0,.15)'; ctx.fillRect(0,0,W,H);

    ph.draw(frame,progress);

    ft++;
    if(ft>=ph.frames){
      ft=0;
      if(phase<phases.length-1){
        phase++;
        topLbl.textContent=phases[phase].name;
      }
    }
  }
  loop();
}

// ── LOVE SCENE ──
function showLoveScene(){
  const fl=document.createElement('div'); fl.className='flash-white'; document.body.appendChild(fl);
  setTimeout(()=>{
    document.getElementById('loveSub').textContent=`— for ${playerName}, from the diary —`;
    show('scene-love'); fl.remove(); spawnHearts();
  },800);
}
function spawnHearts(){
  const colors=['#ff3366','#ff6699','#ff99cc','#ffccdd','#cc0044'];
  const syms=['♥','❤','♡','💗'];
  for(let i=0;i<32;i++) setTimeout(()=>{
    const h=document.createElement('div'); h.className='heart';
    h.textContent=syms[Math.floor(Math.random()*syms.length)];
    h.style.cssText=`left:${Math.random()*100}vw;top:110vh;font-size:${12+Math.random()*26}px;color:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*3}s`;
    document.body.appendChild(h); setTimeout(()=>h.remove(),8000);
  },i*180);
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
</script>

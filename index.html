<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tom Riddle's Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IM Fell English', serif;
    overflow: hidden;
    position: relative;
  }

  /* Particle dust */
  .dust {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .dust-particle {
    position: absolute;
    width: 2px; height: 2px;
    background: radial-gradient(circle, #c8a96e, transparent);
    border-radius: 50%;
    animation: floatDust linear infinite;
    opacity: 0;
  }
  @keyframes floatDust {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
  }

  /* Scene management */
  .scene { display: none; width: 100%; height: 100vh; position: relative; z-index: 1; }
  .scene.active { display: flex; align-items: center; justify-content: center; }

  /* ===================== SCENE 0: NAME ENTRY ===================== */
  #scene-name {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a0f00 0%, #0a0500 60%, #000 100%);
    gap: 0;
  }

  .name-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: nameCardFadeIn 1.2s ease forwards;
    opacity: 0;
  }
  @keyframes nameCardFadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .name-eyebrow {
    font-family: 'IM Fell English SC', serif;
    color: #c8a96e88;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    text-align: center;
  }

  .name-heading {
    font-family: 'Cinzel Decorative', cursive;
    color: #c8a96e;
    font-size: clamp(16px, 3vw, 26px);
    letter-spacing: 3px;
    text-align: center;
    text-shadow: 0 0 40px #c8a96e55;
    line-height: 1.4;
  }

  .name-divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(to right, transparent, #c8a96e66, transparent);
  }

  .name-input-wrap {
    position: relative;
    width: min(320px, 80vw);
  }

  .name-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #c8a96e66;
    padding: 10px 4px;
    color: #f5ead6;
    font-family: 'IM Fell English SC', serif;
    font-size: 18px;
    letter-spacing: 3px;
    text-align: center;
    outline: none;
    transition: border-color 0.3s ease;
    caret-color: #c8a96e;
  }
  .name-input::placeholder {
    color: #c8a96e33;
    font-size: 13px;
    letter-spacing: 4px;
  }
  .name-input:focus {
    border-bottom-color: #c8a96e;
  }
  /* Glow line under input on focus */
  .name-input-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    width: 0; height: 1px;
    background: #c8a96e;
    transform: translateX(-50%);
    transition: width 0.4s ease;
    box-shadow: 0 0 10px #c8a96e;
  }
  .name-input:focus ~ .name-glow-line,
  .name-input-wrap:focus-within::after { width: 100%; }

  .name-submit {
    background: transparent;
    border: 1px solid #c8a96e55;
    color: #c8a96e;
    font-family: 'IM Fell English SC', serif;
    font-size: 13px;
    letter-spacing: 4px;
    padding: 12px 36px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .name-submit::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(to right, transparent, #c8a96e18, transparent);
    transition: left 0.4s ease;
  }
  .name-submit:hover {
    border-color: #c8a96eaa;
    color: #f5ead6;
    box-shadow: 0 0 20px #c8a96e22;
  }
  .name-submit:hover::before { left: 100%; }
  .name-submit:disabled { opacity: 0.3; cursor: default; }

  .name-hint {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: #c8a96e44;
    font-size: 11px;
    letter-spacing: 1px;
    text-align: center;
  }

  /* ===================== SCENE 1: PICKS UP DIARY ===================== */
  #scene-intro {
    flex-direction: column;
    background: radial-gradient(ellipse at center, #1a0f00 0%, #0a0500 60%, #000 100%);
  }

  .floor {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 35%;
    background: linear-gradient(to top, #0d0800, #1a1000);
    border-top: 1px solid #2a1800;
  }

  .diary-on-floor {
    position: absolute;
    bottom: 32%;
    left: 50%;
    transform: translateX(-50%) rotate(-8deg);
    cursor: pointer;
    transition: transform 0.3s ease, filter 0.3s ease;
    animation: gentleFloat 3s ease-in-out infinite;
  }
  .diary-on-floor:hover {
    transform: translateX(-50%) rotate(-4deg) scale(1.08);
    filter: drop-shadow(0 0 20px #c8a96e88);
  }
  @keyframes gentleFloat {
    0%, 100% { bottom: 32%; }
    50% { bottom: 33%; }
  }

  .diary-svg-floor { width: 110px; height: 140px; }

  .prompt-text {
    position: absolute;
    bottom: 18%;
    left: 50%;
    transform: translateX(-50%);
    color: #c8a96e88;
    font-family: 'IM Fell English SC', serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  .scene-title {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    color: #c8a96e;
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(14px, 2.5vw, 22px);
    letter-spacing: 4px;
    text-align: center;
    text-shadow: 0 0 30px #c8a96e66;
    white-space: nowrap;
  }

  /* ===================== SCENE 2: OPEN DIARY + CHAT ===================== */
  #scene-diary {
    background: radial-gradient(ellipse at center, #0f0800 0%, #050300 100%);
    flex-direction: column;
  }

  .open-book-container {
    position: relative;
    width: min(700px, 95vw);
    animation: bookReveal 1s ease forwards;
  }
  @keyframes bookReveal {
    from { opacity: 0; transform: scale(0.7) rotateX(20deg); }
    to { opacity: 1; transform: scale(1) rotateX(0deg); }
  }

  .open-book {
    width: 100%;
    position: relative;
    display: flex;
    gap: 0;
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.9));
  }

  .book-page {
    flex: 1;
    min-height: 400px;
    background: #f5ead6;
    position: relative;
    padding: 30px 24px;
    display: flex;
    flex-direction: column;
  }
  .book-page.left {
    border-radius: 4px 0 0 4px;
    background: linear-gradient(to right, #e8d9bb, #f5ead6);
    box-shadow: inset -4px 0 12px rgba(0,0,0,0.15);
  }
  .book-page.right {
    border-radius: 0 4px 4px 0;
    background: linear-gradient(to left, #e8d9bb, #f5ead6);
    box-shadow: inset 4px 0 12px rgba(0,0,0,0.15);
  }
  .book-spine {
    width: 24px;
    background: linear-gradient(to right, #3d1f00, #6b3800, #3d1f00);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    position: relative;
  }
  .book-spine::after {
    content: 'T.M.R.';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) rotate(90deg);
    color: #c8a96e88;
    font-size: 9px;
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .page-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: repeating-linear-gradient(
      transparent, transparent 27px, #c8a96e22 27px, #c8a96e22 28px
    );
    pointer-events: none;
    border-radius: 4px;
  }

  .page-left-content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .crest-area {
    text-align: center;
    opacity: 0.15;
  }
  .crest-area svg { width: 120px; height: 120px; }

  .page-right-content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* Chat messages */
  .diary-chat {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 8px;
    scrollbar-width: none;
  }
  .diary-chat::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 85%;
    padding: 8px 12px;
    font-size: 12px;
    line-height: 1.6;
    border-radius: 2px;
    animation: inkAppear 0.6s ease forwards;
    opacity: 0;
  }
  @keyframes inkAppear {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.riddle {
    align-self: flex-start;
    color: #1a0a00;
    font-style: italic;
    font-family: 'IM Fell English', serif;
    border-left: 2px solid #6b380066;
    padding-left: 10px;
  }
  .msg.harry {
    align-self: flex-end;
    color: #2d1a00;
    font-family: 'IM Fell English SC', serif;
    font-size: 11px;
    text-align: right;
    border-right: 2px solid #3d1f0066;
    padding-right: 10px;
  }

  /* Typing cursor */
  .typing {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 10px 0;
  }
  .typing span {
    width: 5px; height: 5px;
    background: #6b3800;
    border-radius: 50%;
    animation: typingDot 1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot { 0%,80%,100%{transform:scale(0.5);opacity:0.3} 40%{transform:scale(1);opacity:1} }

  /* Choice buttons */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
  }
  .choice-btn {
    background: transparent;
    border: 1px solid #6b380055;
    color: #3d1f00;
    padding: 7px 12px;
    font-family: 'IM Fell English SC', serif;
    font-size: 11px;
    cursor: pointer;
    text-align: left;
    border-radius: 2px;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }
  .choice-btn:hover {
    background: #6b380015;
    border-color: #6b3800aa;
    color: #1a0900;
    transform: translateX(3px);
  }

  /* ===================== SCENE 3: FLASH ===================== */
  #scene-flash {
    background: #000;
    flex-direction: column;
  }
  .flash-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #fff;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
  }

  /* ===================== SCENE 4: MEMORY / GIRL WALKING ===================== */
  #scene-memory {
    background: #e8e8e8;
    overflow: hidden;
  }

  .memory-scene {
    width: 100%;
    height: 100vh;
    position: relative;
    background: linear-gradient(to bottom, #c8d4e0 0%, #a0b8cc 40%, #7a9ab0 60%, #d4c8a0 60%, #b8a880 80%, #9a8c60 100%);
  }

  /* Corridor/hallway */
  .hallway {
    position: absolute;
    bottom: 38%;
    left: 0; right: 0;
    height: 4px;
    background: #6a5a3a44;
  }

  /* Door at end */
  .door-container {
    position: absolute;
    right: 8%;
    bottom: 38%;
    transform-origin: bottom center;
    animation: doorAppear 0.5s ease 3.5s forwards;
    opacity: 0;
  }
  @keyframes doorAppear { to { opacity: 1; } }

  .door-frame {
    width: 60px;
    height: 90px;
    border: 3px solid #5a3a1a;
    border-bottom: none;
    background: #3a2510;
    position: relative;
    border-radius: 4px 4px 0 0;
  }
  .door-open {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to right, #ff9900 0%, #ffcc00 50%, #ffffff 100%);
    transform-origin: left center;
    transform: scaleX(0);
    animation: doorSwing 0.8s ease 4.2s forwards;
    border-radius: 3px 3px 0 0;
  }
  @keyframes doorSwing { to { transform: scaleX(1); } }
  
  .door-glow {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, #ffdd6688, transparent);
    animation: doorGlow 1s ease 4.2s forwards;
    opacity: 0;
  }
  @keyframes doorGlow { to { opacity: 1; } }

  /* Silhouette girl walking */
  .girl-walker {
    position: absolute;
    bottom: 38%;
    left: -80px;
    animation: girlWalk 3s linear forwards;
    transform-origin: bottom center;
  }
  @keyframes girlWalk {
    0% { left: -80px; }
    85% { left: calc(92% - 100px); }
    100% { left: calc(92% - 80px); opacity: 0; }
  }

  .girl-svg { width: 60px; height: 90px; }

  /* Legs walking animation */
  .leg-left { animation: legSwingLeft 0.4s ease-in-out infinite alternate; transform-origin: 18px 45px; }
  .leg-right { animation: legSwingRight 0.4s ease-in-out infinite alternate; transform-origin: 26px 45px; }
  @keyframes legSwingLeft { from { transform: rotate(-18deg); } to { transform: rotate(18deg); } }
  @keyframes legSwingRight { from { transform: rotate(18deg); } to { transform: rotate(-18deg); } }
  .arm-left { animation: armSwingLeft 0.4s ease-in-out infinite alternate; transform-origin: 16px 28px; }
  .arm-right { animation: armSwingRight 0.4s ease-in-out infinite alternate; transform-origin: 28px 28px; }
  @keyframes armSwingLeft { from { transform: rotate(-12deg); } to { transform: rotate(12deg); } }
  @keyframes armSwingRight { from { transform: rotate(12deg); } to { transform: rotate(-12deg); } }

  /* Trees / atmosphere */
  .tree {
    position: absolute;
    bottom: 38%;
  }

  /* ===================== SCENE 5: I LOVE YOU ===================== */
  #scene-love {
    background: radial-gradient(ellipse at center, #0d0006 0%, #000 100%);
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .love-text {
    font-family: 'Cinzel Decorative', cursive;
    color: #fff;
    font-size: clamp(28px, 7vw, 72px);
    text-align: center;
    letter-spacing: 8px;
    text-shadow: 0 0 60px #ff3366, 0 0 120px #ff336644;
    opacity: 0;
    animation: loveReveal 2s ease 0.5s forwards;
  }
  @keyframes loveReveal {
    0% { opacity: 0; transform: scale(0.5); filter: blur(20px); }
    60% { filter: blur(0px); }
    100% { opacity: 1; transform: scale(1); }
  }

  .love-sub {
    color: #ff336688;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(12px, 2vw, 18px);
    letter-spacing: 6px;
    margin-top: 16px;
    opacity: 0;
    animation: loveReveal 2s ease 1.5s forwards;
    text-align: center;
  }

  /* Hearts floating */
  .heart {
    position: fixed;
    font-size: 20px;
    animation: heartFloat linear forwards;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
  }
  @keyframes heartFloat {
    0% { transform: translateY(0) scale(0); opacity: 0; }
    10% { opacity: 1; transform: scale(1); }
    100% { transform: translateY(-80vh) scale(0.5) rotate(20deg); opacity: 0; }
  }

  /* Flash animation helper */
  .flash-white {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: white;
    z-index: 999;
    pointer-events: none;
    animation: flashAnim 2s ease forwards;
  }
  @keyframes flashAnim {
    0% { opacity: 0; }
    30% { opacity: 1; }
    60% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Ink drip effect on book */
  .ink-drip {
    position: absolute;
    width: 3px;
    background: linear-gradient(to bottom, #1a0a00, transparent);
    animation: drip linear forwards;
    border-radius: 0 0 50% 50%;
  }
  @keyframes drip {
    from { height: 0; opacity: 1; }
    to { height: 40px; opacity: 0; }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .book-page { padding: 16px 12px; min-height: 300px; }
    .open-book-container { width: 98vw; }
    .scene-title { font-size: 11px; letter-spacing: 2px; }
    .msg { font-size: 11px; }
  }
</style>
</head>
<body>

<!-- Floating dust particles -->
<div class="dust" id="dust"></div>

<!-- ======================== SCENE 0: NAME ENTRY ======================== -->
<div id="scene-name" class="scene active">
  <div class="name-card">
    <div class="name-eyebrow">Chamber of Secrets</div>
    <div class="name-heading">Who dares open<br>the diary?</div>
    <div class="name-divider"></div>
    <div class="name-input-wrap">
      <input
        class="name-input"
        id="nameInput"
        type="text"
        placeholder="Enter your name..."
        maxlength="24"
        autocomplete="off"
        spellcheck="false"
        onkeydown="if(event.key==='Enter') submitName()"
      />
    </div>
    <button class="name-submit" id="nameSubmitBtn" onclick="submitName()" disabled>Open the Diary</button>
    <div class="name-hint">Press Enter or click to continue</div>
  </div>
  <!-- Atmospheric candles -->
  <svg style="position:absolute;bottom:10%;left:8%;width:28px;height:55px;pointer-events:none;opacity:0.35" viewBox="0 0 30 60">
    <rect x="11" y="25" width="8" height="35" rx="1" fill="#d4a050"/>
    <ellipse cx="15" cy="22" rx="5" ry="8" fill="#ffcc44" opacity="0.8">
      <animate attributeName="ry" values="8;10;7;9;8" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
  </svg>
  <svg style="position:absolute;bottom:10%;right:9%;width:28px;height:55px;pointer-events:none;opacity:0.3" viewBox="0 0 30 60">
    <rect x="11" y="25" width="8" height="35" rx="1" fill="#d4a050"/>
    <ellipse cx="15" cy="22" rx="5" ry="8" fill="#ffcc44" opacity="0.8">
      <animate attributeName="ry" values="7;9;8;10;7" dur="1.8s" repeatCount="indefinite"/>
    </ellipse>
  </svg>
</div>

<!-- ======================== SCENE 1: INTRO ======================== -->
<div id="scene-intro" class="scene">
  <div class="scene-title">Chamber of Secrets</div>
  
  <div class="floor"></div>
  
  <!-- Ambient fog -->
  <svg style="position:absolute;bottom:30%;left:0;width:100%;height:120px;pointer-events:none" viewBox="0 0 800 120" preserveAspectRatio="none">
    <defs>
      <radialGradient id="fogGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.06"/>
        <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <ellipse cx="400" cy="60" rx="400" ry="60" fill="url(#fogGrad)"/>
  </svg>
  
  <!-- Diary on floor -->
  <div class="diary-on-floor" onclick="openDiary()" title="Pick up the diary">
    <svg class="diary-svg-floor" viewBox="0 0 110 140" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="coverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#4a2800"/>
          <stop offset="50%" stop-color="#6b3800"/>
          <stop offset="100%" stop-color="#3d1f00"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Shadow -->
      <ellipse cx="55" cy="138" rx="40" ry="5" fill="#00000088"/>
      <!-- Book cover -->
      <rect x="8" y="6" width="94" height="126" rx="4" fill="url(#coverGrad)" stroke="#1a0900" stroke-width="1"/>
      <!-- Spine -->
      <rect x="8" y="6" width="10" height="126" rx="2" fill="#2a1000"/>
      <!-- Cover texture lines -->
      <line x1="22" y1="20" x2="96" y2="20" stroke="#c8a96e22" stroke-width="0.5"/>
      <line x1="22" y1="120" x2="96" y2="120" stroke="#c8a96e22" stroke-width="0.5"/>
      <!-- Title area -->
      <rect x="22" y="40" width="72" height="60" rx="2" fill="none" stroke="#c8a96e44" stroke-width="0.5"/>
      <!-- T.M.R. text suggestion -->
      <text x="58" y="68" text-anchor="middle" font-family="serif" font-size="8" fill="#c8a96e88" letter-spacing="3">T.M.R.</text>
      <text x="58" y="82" text-anchor="middle" font-family="serif" font-size="6" fill="#c8a96e55">❧</text>
      <!-- Aged spots -->
      <circle cx="85" cy="15" r="2" fill="#1a0900" opacity="0.3"/>
      <circle cx="30" cy="125" r="1.5" fill="#1a0900" opacity="0.3"/>
      <!-- Glow hint -->
      <ellipse cx="58" cy="70" rx="30" ry="20" fill="#c8a96e" opacity="0.03" filter="url(#glow)"/>
    </svg>
    <div class="prompt-text">Click to pick up</div>
  </div>
  
  <!-- Atmospheric candles far back -->
  <svg style="position:absolute;bottom:34%;left:10%;width:30px;height:60px;pointer-events:none;opacity:0.4" viewBox="0 0 30 60">
    <rect x="11" y="25" width="8" height="35" rx="1" fill="#d4a050"/>
    <ellipse cx="15" cy="22" rx="5" ry="8" fill="#ffcc44" opacity="0.8">
      <animate attributeName="ry" values="8;10;7;9;8" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
  </svg>
  <svg style="position:absolute;bottom:34%;right:12%;width:30px;height:50px;pointer-events:none;opacity:0.3" viewBox="0 0 30 60">
    <rect x="11" y="25" width="8" height="35" rx="1" fill="#d4a050"/>
    <ellipse cx="15" cy="22" rx="5" ry="8" fill="#ffcc44" opacity="0.8">
      <animate attributeName="ry" values="7;9;8;10;7" dur="1.8s" repeatCount="indefinite"/>
    </ellipse>
  </svg>
</div>

<!-- ======================== SCENE 2: OPEN DIARY ======================== -->
<div id="scene-diary" class="scene">
  <div class="open-book-container">
    <div class="open-book">
      <!-- Left page: decorative -->
      <div class="book-page left">
        <div class="page-lines"></div>
        <div class="page-left-content">
          <div class="crest-area">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <polygon points="60,10 110,40 110,80 60,110 10,80 10,40" fill="none" stroke="#3d1f00" stroke-width="1.5"/>
              <polygon points="60,20 100,45 100,75 60,100 20,75 20,45" fill="none" stroke="#3d1f0055" stroke-width="0.5"/>
              <text x="60" y="58" text-anchor="middle" font-family="serif" font-size="14" fill="#3d1f00">T</text>
              <text x="60" y="72" text-anchor="middle" font-family="serif" font-size="8" fill="#3d1f0088" letter-spacing="1">MARVOLO RIDDLE</text>
            </svg>
            <div style="font-family:'IM Fell English SC',serif;font-size:9px;color:#3d1f0066;letter-spacing:2px;margin-top:8px">Property of T.M. Riddle</div>
          </div>
        </div>
        <!-- Ink stain -->
        <div style="position:absolute;bottom:20px;left:20px;width:40px;height:30px;background:radial-gradient(ellipse,#1a0a0022,transparent);border-radius:50%"></div>
      </div>
      
      <!-- Spine -->
      <div class="book-spine"></div>
      
      <!-- Right page: chat -->
      <div class="book-page right">
        <div class="page-lines"></div>
        <div class="page-right-content">
          <div class="diary-chat" id="chat-messages"></div>
          <div class="choices" id="choices-area"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ======================== SCENE 3: MEMORY/GIRL ======================== -->
<div id="scene-memory" class="scene">
  <div class="memory-scene">
    <!-- Sky atmosphere -->
    <div style="position:absolute;top:0;left:0;right:0;height:60%;background:linear-gradient(to bottom,#b8c8d8,#d0dce8,#c8c0a0);opacity:0.9"></div>
    
    <!-- Ground -->
    <div style="position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(to top,#6a5a30,#8a7a50,#a08a60)"></div>
    
    <!-- Hallway/path markers -->
    <div style="position:absolute;bottom:38%;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,#6a5a3866,transparent)"></div>

    <!-- Trees silhouettes -->
    <svg style="position:absolute;bottom:37%;left:5%" viewBox="0 0 50 120" width="40" height="90" xmlns="http://www.w3.org/2000/svg">
      <rect x="21" y="60" width="8" height="60" fill="#2a1a08"/>
      <ellipse cx="25" cy="45" rx="20" ry="30" fill="#1a3010"/>
      <ellipse cx="15" cy="55" rx="15" ry="22" fill="#152810"/>
      <ellipse cx="35" cy="55" rx="15" ry="22" fill="#152810"/>
    </svg>
    <svg style="position:absolute;bottom:37%;right:15%" viewBox="0 0 50 120" width="35" height="80" xmlns="http://www.w3.org/2000/svg">
      <rect x="21" y="60" width="8" height="60" fill="#2a1a08"/>
      <ellipse cx="25" cy="40" rx="18" ry="28" fill="#1a3010"/>
      <ellipse cx="17" cy="52" rx="13" ry="20" fill="#152810"/>
    </svg>
    <svg style="position:absolute;bottom:37%;left:20%" viewBox="0 0 40 100" width="30" height="70" xmlns="http://www.w3.org/2000/svg" opacity="0.7">
      <rect x="16" y="50" width="7" height="50" fill="#2a1a08"/>
      <ellipse cx="20" cy="38" rx="16" ry="24" fill="#1a3010"/>
    </svg>
    
    <!-- Castle suggestion far background -->
    <svg style="position:absolute;top:10%;right:10%;opacity:0.25" viewBox="0 0 160 100" width="140" height="90" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="40" width="120" height="60" fill="#607080"/>
      <rect x="10" y="20" width="30" height="80" fill="#506070"/>
      <rect x="120" y="25" width="30" height="75" fill="#506070"/>
      <rect x="50" y="10" width="20" height="90" fill="#607080"/>
      <rect x="90" y="15" width="20" height="85" fill="#607080"/>
      <!-- Battlements -->
      <rect x="10" y="14" width="6" height="10" fill="#506070"/>
      <rect x="20" y="14" width="6" height="10" fill="#506070"/>
      <rect x="120" y="20" width="6" height="10" fill="#506070"/>
      <rect x="130" y="20" width="6" height="10" fill="#506070"/>
    </svg>

    <!-- Walking girl silhouette -->
    <div class="girl-walker" id="girl">
      <svg class="girl-svg" viewBox="0 0 44 90" xmlns="http://www.w3.org/2000/svg">
        <!-- Head -->
        <ellipse cx="22" cy="9" rx="7" ry="8" fill="#1a1008"/>
        <!-- Hair flowing -->
        <ellipse cx="22" cy="11" rx="9" ry="6" fill="#0d0804"/>
        <path d="M14 8 Q8 16 10 28" stroke="#0d0804" stroke-width="4" fill="none" stroke-linecap="round"/>
        <!-- Body -->
        <rect x="15" y="17" width="14" height="22" rx="3" fill="#1a1008"/>
        <!-- Skirt/dress flare -->
        <path d="M13 36 Q10 50 8 58 L36 58 Q34 50 31 36 Z" fill="#1a1008"/>
        <!-- Arms -->
        <g class="arm-left">
          <rect x="7" y="18" width="6" height="18" rx="3" fill="#1a1008"/>
        </g>
        <g class="arm-right">
          <rect x="31" y="18" width="6" height="18" rx="3" fill="#1a1008"/>
        </g>
        <!-- Legs -->
        <g class="leg-left">
          <rect x="13" y="56" width="7" height="22" rx="3" fill="#1a1008"/>
          <rect x="11" y="74" width="9" height="5" rx="2" fill="#0d0804"/>
        </g>
        <g class="leg-right">
          <rect x="24" y="56" width="7" height="22" rx="3" fill="#1a1008"/>
          <rect x="24" y="74" width="9" height="5" rx="2" fill="#0d0804"/>
        </g>
      </svg>
    </div>
    
    <!-- Door at end of path -->
    <div class="door-container" id="memoryDoor">
      <div class="door-frame">
        <div class="door-open"></div>
        <div class="door-glow"></div>
        <!-- Doorknob -->
        <div style="position:absolute;right:8px;top:45%;width:6px;height:6px;background:#c8a96e;border-radius:50%"></div>
      </div>
    </div>
    
    <!-- Memory title vignette -->
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,transparent 50%,#00000088 100%);pointer-events:none"></div>
    
    <!-- "A Memory" label -->
    <div style="position:absolute;top:8%;left:50%;transform:translateX(-50%);color:#e8d8b0;font-family:'IM Fell English SC',serif;font-size:12px;letter-spacing:4px;opacity:0.7;text-shadow:0 0 20px #c8a96e">A Memory</div>
  </div>
</div>

<!-- ======================== SCENE 4: I LOVE YOU ======================== -->
<div id="scene-love" class="scene">
  <div class="love-text">I Love You</div>
  <div class="love-sub">— from the diary —</div>
</div>

<script>
// ===================== SETUP DUST PARTICLES =====================
const dust = document.getElementById('dust');
for (let i = 0; i < 35; i++) {
  const p = document.createElement('div');
  p.className = 'dust-particle';
  p.style.cssText = `
    left: ${Math.random()*100}%;
    width: ${1+Math.random()*2}px;
    height: ${1+Math.random()*2}px;
    animation-duration: ${8+Math.random()*15}s;
    animation-delay: ${-Math.random()*20}s;
  `;
  dust.appendChild(p);
}

// ===================== NAME ENTRY =====================
let playerName = 'Harry';

const nameInput = document.getElementById('nameInput');
const nameSubmitBtn = document.getElementById('nameSubmitBtn');

nameInput.addEventListener('input', () => {
  const val = nameInput.value.trim();
  nameSubmitBtn.disabled = val.length === 0;
});

function submitName() {
  const val = nameInput.value.trim();
  if (!val) return;
  playerName = val.charAt(0).toUpperCase() + val.slice(1);

  // Fade out name scene, reveal intro
  const nameScene = document.getElementById('scene-name');
  nameScene.style.transition = 'opacity 0.7s ease';
  nameScene.style.opacity = '0';
  setTimeout(() => showScene('scene-intro'), 700);
}

// ===================== SCENE SWITCHER =====================
function showScene(id) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===================== SCENE 1 → 2: OPEN DIARY =====================
function openDiary() {
  const diary = document.querySelector('.diary-on-floor');
  diary.style.transition = 'all 0.8s cubic-bezier(0.25,0.46,0.45,0.94)';
  diary.style.transform = 'translateX(-50%) scale(1.4) rotate(0deg) translateY(-60px)';
  diary.style.filter = 'drop-shadow(0 0 40px #c8a96e)';
  
  setTimeout(() => {
    showScene('scene-diary');
    startDiaryConversation();
  }, 900);
}

// ===================== DIARY CONVERSATION ENGINE =====================
const chat = document.getElementById('chat-messages');
const choicesArea = document.getElementById('choices-area');

function addMessage(text, who, delay=0) {
  return new Promise(resolve => {
    let typing = null;
    if (who === 'riddle' && delay > 300) {
      typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      chat.appendChild(typing);
      chat.scrollTop = chat.scrollHeight;
    }
    setTimeout(() => {
      if (typing) typing.remove();
      const msg = document.createElement('div');
      msg.className = `msg ${who}`;
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      resolve();
    }, delay);
  });
}

function showChoices(options) {
  choicesArea.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.text;
    btn.onclick = () => opt.action();
    choicesArea.appendChild(btn);
  });
}

function clearChoices() {
  choicesArea.innerHTML = '';
}

async function startDiaryConversation() {
  await sleep(600);
  await addMessage("My name is Tom Riddle.", 'riddle', 400);
  await sleep(700);
  await addMessage(`Hey there, ${playerName}! How can I help you?`, 'riddle', 1000);
  await sleep(400);

  showChoices([
    {
      text: "Who are you really?",
      action: async () => {
        clearChoices();
        await addMessage("Who are you really?", 'player', 0);
        await addMessage(`I am many things, ${playerName}. A memory... preserved in ink and magic.`, 'riddle', 1200);
        await sleep(600);
        showInitialChoices();
      }
    },
    {
      text: "Can you show me things?",
      action: async () => {
        clearChoices();
        await addMessage("Can you show me things?", 'player', 0);
        await addMessage("I can show you things no one else can. Secrets hidden in the past.", 'riddle', 1200);
        await sleep(600);
        showInitialChoices();
      }
    },
    {
      text: "Tell me about the Chamber of Secrets.",
      action: () => proceedToSecret()
    }
  ]);
}

function showInitialChoices() {
  showChoices([
    {
      text: "Yes, tell me — show me your secrets!",
      action: () => proceedToSecret()
    },
    {
      text: "What's inside the Chamber?",
      action: () => proceedToSecret()
    }
  ]);
}

async function proceedToSecret() {
  clearChoices();
  await addMessage("Yes, tell me! Show me!", 'player', 0);
  await sleep(400);
  await addMessage("I cannot tell you...", 'riddle', 1200);
  await sleep(600);
  await addMessage("But I can show you.", 'riddle', 800);
  await sleep(500);
  spawnInkDrips();
  await sleep(1500);
  triggerFlashAndMemory();
}

function spawnInkDrips() {
  const book = document.querySelector('.book-page.right');
  for (let i = 0; i < 4; i++) {
    setTimeout(() => {
      const drip = document.createElement('div');
      drip.className = 'ink-drip';
      drip.style.cssText = `
        left: ${20 + Math.random()*80}%;
        top: ${10 + Math.random()*60}%;
        height: 0;
        animation: drip ${0.8+Math.random()*0.5}s linear forwards;
      `;
      book.appendChild(drip);
      setTimeout(() => drip.remove(), 1500);
    }, i * 200);
  }
}

// ===================== FLASH THEN MEMORY =====================
function triggerFlashAndMemory() {
  const flash = document.createElement('div');
  flash.className = 'flash-white';
  document.body.appendChild(flash);
  setTimeout(() => {
    showScene('scene-memory');
    flash.remove();
    setTimeout(() => showLoveScene(), 5500);
  }, 2000);
}

function showLoveScene() {
  const flash2 = document.createElement('div');
  flash2.className = 'flash-white';
  document.body.appendChild(flash2);
  setTimeout(() => {
    // Update love text with player name
    document.querySelector('.love-sub').textContent = `— for ${playerName}, from the diary —`;
    showScene('scene-love');
    flash2.remove();
    spawnHearts();
  }, 800);
}

// ===================== HEARTS =====================
function spawnHearts() {
  const colors = ['#ff3366','#ff6699','#ff99cc','#ffccdd','#cc0044'];
  const symbols = ['♥','❤','♡','💗'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      heart.style.cssText = `
        left: ${Math.random()*100}vw;
        top: 110vh;
        font-size: ${12+Math.random()*24}px;
        color: ${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration: ${2+Math.random()*4}s;
        animation-delay: ${Math.random()*3}s;
      `;
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 7000);
    }, i * 200);
  }
}

// ===================== HELPER =====================
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Also rename .harry CSS class usage to .player in messages
// (we already use 'player' as class in addMessage calls above)
const style = document.createElement('style');
style.textContent = `.msg.player { align-self: flex-end; color: #2d1a00; font-family: 'IM Fell English SC', serif; font-size: 11px; text-align: right; border-right: 2px solid #3d1f0066; padding-right: 10px; }`;
document.head.appendChild(style);

</script>
</body>
</html>
